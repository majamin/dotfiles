general {
    hide_cursor = true
}

background {
    monitor =
    path = /home/marian/Maja/Media/Images/Backgrounds/desktop/digi.png
    blur_passes = 2
    blur_size = 12
}

label {
    monitor =
    text = cmd[update:1000] date '+%-I:%M %P'
    color = rgba(f5f5f0ee)
    font_size = 72
    font_family = Fira Sans Light
    position = 0, 80
    halign = center
    valign = center
}


label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %B %d, %Y')"
    color = rgba(f5f5f0ee)
    font_size = 24
    font_family = Fira Sans Light
    position = 0, 0
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    outer_color = rgba(8b8bab80)
    inner_color = rgba(f5f5f0cc)
    font_color = rgb(2d2d2d)
    fade_on_empty = true
    placeholder_text = <i>password</i>
    rounding = 8
    check_color = rgb(5c7a9f)
    fail_color = rgb(cc4444)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    position = 0, -80
    halign = center
    valign = center
}
