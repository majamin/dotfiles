# GitHub Light theme for tmux
set-option -g status-style "fg=#57606a,bg=default"
set-option -g window-status-format "#[fg=#57606a][#I#{?#{!=:#W,},:,}#W]"
set-option -g window-status-current-format "#[fg=#0969da,underscore][#I#{?#{!=:#W,},:,}#W]"
set-option -g window-status-activity-style "fg=#9a6700,bg=default"
set-option -g mode-style "fg=#ffffff,bg=#0969da,bold"
set-option -g message-style "fg=#ffffff,bg=#0969da,bold"
set-option -g message-command-style "fg=#ffffff,bg=#0969da,bold"
set-option -g pane-border-style "fg=#d0d7de"
set-option -g pane-active-border-style "fg=#0969da"
