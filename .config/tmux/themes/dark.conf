# GitHub Dark theme for tmux
set-option -g status-style "fg=#8b949e,bg=default"
set-option -g window-status-format "#[fg=#8b949e][#I#{?#{!=:#W,},:,}#W]"
set-option -g window-status-current-format "#[fg=#58a6ff,underscore][#I#{?#{!=:#W,},:,}#W]"
set-option -g window-status-activity-style "fg=#d29922,bg=default"
set-option -g mode-style "fg=#ffffff,bg=#1f6feb,bold"
set-option -g message-style "fg=#ffffff,bg=#1f6feb,bold"
set-option -g message-command-style "fg=#ffffff,bg=#1f6feb,bold"
set-option -g pane-border-style "fg=#30363d"
set-option -g pane-active-border-style "fg=#58a6ff"
