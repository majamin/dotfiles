monitor.alsa.rules = [
  # Enable automatic profile and port switching on all ALSA cards
  # (handles speaker <-> aux headphone jack switching automatically)
  {
    matches = [
      {
        device.name = "~alsa_card.*"
      }
    ]
    actions = {
      update-props = {
        api.acp.auto-profile = true
        api.acp.auto-port = true
      }
    }
  }
  # Aux headphone jack: highest priority — always preferred over bluetooth
  {
    matches = [
      {
        node.name = "~alsa_output.*HiFi__Headphones*"
      }
    ]
    actions = {
      update-props = {
        priority.session = 2500
      }
    }
  }
  # HDMI outputs: lowest priority — never auto-selected
  # (manually override via system audio settings when using a TV)
  {
    matches = [
      {
        node.name = "~alsa_output.*HDMI*"
      }
    ]
    actions = {
      update-props = {
        priority.driver = 100
        priority.session = 100
      }
    }
  }
]

monitor.bluez.rules = [
  # Bluetooth headphones: high priority — auto-selected when connected,
  # yields to aux headphones if both are active
  {
    matches = [
      {
        node.name = "~bluez_output.*"
      }
    ]
    actions = {
      update-props = {
        priority.session = 2000
      }
    }
  }
]
